# OpenNext auf Cloudflare Workers — "name" und WORKER_SELF_REFERENCE.service müssen identisch sein
# (muss dem Worker-Namen im Cloudflare-Dashboard entsprechen)
#
# Kontaktformular (/api/contact): Variablen im Dashboard unter diesem Worker setzen, nicht nur in GitHub:
#   Workers → lavik-media-website → Settings → Variables and Secrets
#   - RESEND_API_KEY  (als Secret)
#   - CONTACT_TO_EMAIL (z. B. kontakt@lavik-media.com), CONTACT_FROM_EMAIL (optional, Plaintext)
# GitHub-Secrets allein reichen nicht — nach dem Setzen erneut deployen.

name = "lavik-media-website"
main = ".open-next/worker.js"
compatibility_date = "2024-12-30"

routes = [
  { pattern = "lavik-media.com", custom_domain = true },
  { pattern = "www.lavik-media.com", custom_domain = true },
]

compatibility_flags = [
  "nodejs_compat",
  "global_fetch_strictly_public",
]

[assets]
directory = ".open-next/assets"
binding = "ASSETS"

[[services]]
binding = "WORKER_SELF_REFERENCE"
service = "lavik-media-website"

[images]
binding = "IMAGES"
